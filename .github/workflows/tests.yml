name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '10'
            illuminate: '^10.0'
            testbench: '^8.0'
          - php: '8.3'
            laravel: '10'
            illuminate: '^10.0'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: |
          composer update -W --prefer-dist --no-interaction --no-progress \
            "illuminate/support:${{ matrix.illuminate }}" \
            "orchestra/testbench:${{ matrix.testbench }}"

      - name: Run PHPUnit
        run: composer test
